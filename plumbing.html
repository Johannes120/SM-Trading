<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plumbing Services | SM Trading</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary-dark: #1F4D43;
    --primary: #2E6B5C;
    --accent: #CBBFA6;
    --light: #F5F1E8;
    --text-dark: #1A1A1A;
    --text-light: #FFFFFF;
    --glass: rgba(203, 191, 166, 0.95);
    --before-red: #bc4b4b;
    --after-green: #2e7d32;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Roboto, Arial;
}

body {
    background: var(--light);
    color: var(--text-dark);
    padding-top: 120px;
    line-height: 1.6;
}

/* ===== NAVBAR ===== */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    position:fixed;
    top:15px;
    left:20px;
    right:20px;
    z-index:1000;
    background:var(--glass);
    backdrop-filter:blur(12px);
    border-radius:50px;
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 8px 32px rgba(0,0,0,0.15);
}

.logo {
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:var(--primary-dark);
    font-weight:bold;
}

.logo-img {
    width:40px;
    height:40px;
    border-radius:50%;
}

/* NAV LINKS */
.nav-links {
    display:flex;
    gap:25px;
}

.nav-links a {
    text-decoration:none;
    color:var(--primary-dark);
    font-weight:600;
}

/* MOBILE MENU */
.menu-toggle {
    display:none;
    font-size:24px;
    cursor:pointer;
}

/* ===== HEADER ===== */
.gallery-header {
    text-align:center;
    max-width:800px;
    margin:40px auto 60px;
    padding:0 20px;
}

.gallery-header h1 {
    font-size:clamp(28px,5vw,48px);
    color:var(--primary-dark);
}

.gallery-header p {
    color:#555;
}

/* ===== GALLERY ===== */
.transformation-container {
    max-width:1200px;
    margin:auto;
    padding:0 20px;
}

.comparison-row {
    margin-bottom:80px;
}

.project-title {
    text-align:center;
    margin-bottom:30px;
    font-size:22px;
}

.image-pair-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.work-card {
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    transition:0.3s;
}

.work-card:hover {
    transform:translateY(-5px);
}

.image-container {
    height:350px;
    overflow:hidden;
}

.image-container img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.status-label {
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
}

.before-label { background:var(--before-red); }
.after-label { background:var(--after-green); }

.card-info {
    padding:20px;
}

/* ===== FOOTER ===== */
footer {
    background:#163a32;
    color:white;
    padding:40px 20px;
}

.footer-container {
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){

    body { padding-top:100px; }

    .menu-toggle { display:block; }

    .nav-links {
        position:absolute;
        top:80px;
        left:0;
        right:0;
        background:white;
        flex-direction:column;
        padding:25px;
        border-radius:25px;
        display:none;
        text-align:center;
    }

    .nav-links.active { display:flex; }

    .image-pair-grid {
        grid-template-columns:1fr;
    }

    .image-container {
        height:250px;
    }

    .footer-container {
        flex-direction:column;
        text-align:center;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="index.html" class="logo">
        <img src="logo-image.png" class="logo-img">
        <span>SM Trading</span>
    </a>

    <div class="menu-toggle" id="mobile-menu">
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="nav-links" id="nav-list">
        <a href="index.html">Home</a>
        <a href="aboutus.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<!-- HEADER -->
<section class="gallery-header">
    <h1>Master Plumbing Solutions</h1>
    <p>Reliable plumbing services and installations.</p>
</section>

<!-- GALLERY -->
<section class="transformation-container">

    <div class="comparison-row">
        <h3 class="project-title">Sanitary Installation</h3>

        <div class="image-pair-grid">

            <div class="work-card">
                <div class="image-container">
                    <img src="images/bathroom_before.jpg">
                </div>
                <div class="card-info">
                    <h4>Before</h4>
                    <p>Preparation phase.</p>
                </div>
            </div>

            <div class="work-card">
                <div class="image-container">
                    <img src="images/bathroom_after.jpg">
                </div>
                <div class="card-info">
                    <h4>After</h4>
                    <p>Completed installation.</p>
                </div>
            </div>

        </div>
    </div>

</section>

<!-- FOOTER -->
<footer>
    <div class="footer-container">
        <p>© 2026 SM Trading</p>
    </div>
</footer>

<!-- MOBILE MENU SCRIPT -->
<script>
const menuToggle = document.getElementById('mobile-menu');
const navList = document.getElementById('nav-list');

menuToggle.addEventListener('click', () => {
    navList.classList.toggle('active');
});

document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
        navList.classList.remove('active');
    });
});
</script>

</body>
</html>

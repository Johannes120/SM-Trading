<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Maintenance | SM Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-dark: #1F4D43;
            --primary: #2E6B5C;
            --accent: #CBBFA6;
            --light: #F5F1E8;
            --text-dark: #1A1A1A;
            --text-light: #FFFFFF;
            --glass: rgba(203, 191, 166, 0.95);
            --tag-bg: #2E6B5C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--light); color: var(--text-dark); padding-top: 140px; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;
            position: fixed; top: 15px; left: 20px; right: 20px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(12px); border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--primary-dark); font-weight: bold; font-size: 22px; }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-dark); }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--primary-dark); font-weight: 600; transition: 0.3s; }
        .menu-toggle { display: none; font-size: 24px; color: var(--primary-dark); cursor: pointer; }

        .gallery-header { text-align: center; max-width: 900px; margin: 0 auto 60px auto; padding: 0 20px; }
        .gallery-header h1 { color: var(--primary-dark); font-size: 42px; margin-bottom: 15px; }
        .gallery-header p { font-size: 19px; color: #444; line-height: 1.6; }

        .project-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px; max-width: 1300px; margin: 0 auto 100px auto; padding: 0 25px;
        }

        .work-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.08); transition: 0.4s; position: relative; }
        .status-tag { position: absolute; top: 20px; left: 20px; color: white; padding: 6px 15px; border-radius: 50px; font-weight: bold; font-size: 12px; background: var(--tag-bg); z-index: 10; }
        .image-container { position: relative; width: 100%; height: 350px; overflow: hidden; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .work-card:hover img { transform: scale(1.08); }
        .card-info { padding: 30px; }
        .card-info h4 { color: var(--primary-dark); font-size: 22px; margin-bottom: 12px; }

        footer { background: #163a32; color: var(--text-light); padding: 60px 20px; }
        .footer-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto; flex-wrap: wrap; gap: 30px; }
        .footer-socials a { color: var(--accent); font-size: 22px; margin-left: 15px; }

        @media (max-width: 900px) {
            .menu-toggle { display: block; }
            .nav-links { display: none; position: absolute; top: 80px; left: 0; right: 0; background: white; flex-direction: column; padding: 20px; border-radius: 20px; text-align: center; }
            .nav-links.active { display: flex; }
            .project-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="logo-image.png" alt="Logo" class="logo-img">
            <span>SM Trading</span>
        </a>
        <div class="menu-toggle" id="mobile-menu"><i class="fa-solid fa-bars"></i></div>
        <div class="nav-links" id="nav-list">
            <a href="index.html">Home</a>
            <a href="aboutus.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <section class="gallery-header">
            <h1>General Facility Maintenance</h1>
            <p>From structural reinforcement to restoration, we keep your property efficient and safe.</p>
        </section>
        <section class="project-grid">
            <article class="work-card">
                <span class="status-tag">Structural Repair</span>
                <div class="image-container"><img src="images/roofing_before.jpg" alt="Repair" loading="lazy"></div>
                <div class="card-info">
                    <h4>Hardware Restoration</h4>
                    <p>Removing oxidation and applying protective coatings to prevent rust.</p>
                </div>
            </article>
            </section>
    </main>

    <script>
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');
        menuToggle.addEventListener('click', () => navList.classList.toggle('active'));
    </script>
</body>
</html>
